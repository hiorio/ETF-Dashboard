name: ETF 분배금 공시 수집

on:
  schedule:
    # 매일 00:30 UTC = 09:30 KST (장 마감 전 수집)
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

# 동일 그룹: weekly 워크플로우와 충돌하지 않도록 별도 그룹
concurrency:
  group: etf-dist-announce
  cancel-in-progress: true

jobs:
  collect-dist-announcements:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore ETF DB from latest artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_URL=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=50" \
            --jq '[.artifacts[] | select(.name=="etf-db" and .expired==false)] | sort_by(.created_at) | last | .archive_download_url // empty')

          if [ -n "$ARTIFACT_URL" ]; then
            echo "이전 DB artifact 복원 중..."
            curl -fsSL -H "Authorization: Bearer $GITHUB_TOKEN" "$ARTIFACT_URL" -o /tmp/etf-db.zip
            unzip -o /tmp/etf-db.zip -d /tmp/etf-db-extracted/
            DB_FILE=$(find /tmp/etf-db-extracted/ -name "etf.db" | head -1)
            if [ -n "$DB_FILE" ]; then
              cp "$DB_FILE" data/etf.db
              echo "DB 복원 완료: $(ls -lh data/etf.db)"
            else
              echo "::warning::DB artifact에서 etf.db 없음"
            fi
          else
            echo "이전 DB artifact 없음"
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect distribution announcements
        run: python3 scripts/dist_announcement_collector.py

      - name: Generate HTML report (공시 반영)
        run: python3 scripts/report.py

      - name: Upload DB artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: etf-db
          path: data/etf.db
          retention-days: 90

      - name: Commit & push (HTML only)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html 2>/dev/null || true
          git diff --cached --quiet || \
            git commit -m "chore: 분배금 공시 업데이트 $(date +'%Y-%m-%d') [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            echo "::warning::push 실패 (${i}/3) — 재시도..."
            sleep $((i * 10))
          done
