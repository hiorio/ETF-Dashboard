name: Collect ETF Data & Update Report

on:
  schedule:
    # 매주 월요일 00:00 UTC = 09:00 KST
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect ETF data
        run: python3 scripts/collector.py

      - name: Generate HTML report
        run: python3 scripts/report.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf.db docs/index.html
          # 변경사항이 있을 때만 커밋
          git diff --cached --quiet || \
            git commit -m "chore: weekly ETF data update $(date +'%Y-%m-%d')"
          git push
