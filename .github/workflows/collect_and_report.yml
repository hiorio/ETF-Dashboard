name: Collect ETF Data & Update Report

on:
  schedule:
    # 매일 00:00 UTC = 09:00 KST
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      # 코드나 ETF 목록이 변경될 때만 실행 (bot 커밋 재실행 방지)
      - "scripts/collector.py"
      - "scripts/report.py"
      - "data/etf_list.json"
      - "requirements.txt"

permissions:
  contents: write

jobs:
  collect-and-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect ETF data
        run: python3 scripts/collector.py

      - name: Generate HTML report
        run: python3 scripts/report.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/etf.db docs/index.html
          # 변경사항이 있을 때만 커밋
          git diff --cached --quiet || \
            git commit -m "chore: daily ETF data update $(date +'%Y-%m-%d') [skip ci]"
          git push
